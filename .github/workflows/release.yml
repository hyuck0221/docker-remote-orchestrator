name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            task: packageDmg
            ext: dmg
            java-arch: aarch64
          - os: macos-latest
            platform: macos-x64
            task: packageDmg
            ext: dmg
            java-arch: x64
          - os: windows-latest
            platform: windows-x64
            task: packageMsi
            ext: msi
            java-arch: x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: ${{ matrix.java-arch }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in gradle.properties
        shell: bash
        run: |
          sed -i.bak "s/^app.version=.*/app.version=${{ steps.version.outputs.version }}/" gradle.properties
          cat gradle.properties

      - name: Prepare icon
        run: |
          mkdir -p desktop/build/generated/icons
          cp desktop/src/main/resources/icons/icon.png desktop/build/generated/icons/icon.png
        shell: bash

      - name: Convert icon to platform format (macOS)
        if: runner.os == 'macOS'
        run: |
          ICON_DIR=desktop/build/generated/icons
          mkdir -p "$ICON_DIR/icon.iconset"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size "$ICON_DIR/icon.png" --out "$ICON_DIR/icon.iconset/icon_${size}x${size}.png" > /dev/null
            double=$((size * 2))
            if [ $double -le 1024 ]; then
              sips -z $double $double "$ICON_DIR/icon.png" --out "$ICON_DIR/icon.iconset/icon_${size}x${size}@2x.png" > /dev/null
            fi
          done
          cp "$ICON_DIR/icon.png" "$ICON_DIR/icon.iconset/icon_512x512@2x.png"
          iconutil -c icns "$ICON_DIR/icon.iconset" -o "$ICON_DIR/icon.icns"
          echo "Generated icon.icns"
        shell: bash

      - name: Convert icon to platform format (Windows)
        if: runner.os == 'Windows'
        run: |
          $iconDir = "desktop/build/generated/icons"
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$iconDir/icon.png")
          $icon16 = New-Object System.Drawing.Bitmap($png, 16, 16)
          $icon32 = New-Object System.Drawing.Bitmap($png, 32, 32)
          $icon48 = New-Object System.Drawing.Bitmap($png, 48, 48)
          $icon256 = New-Object System.Drawing.Bitmap($png, 256, 256)
          $ms = New-Object System.IO.MemoryStream
          $bw = New-Object System.IO.BinaryWriter($ms)
          $images = @($icon16, $icon32, $icon48, $icon256)
          $bw.Write([UInt16]0)
          $bw.Write([UInt16]1)
          $bw.Write([UInt16]$images.Count)
          $dataOffset = 6 + ($images.Count * 16)
          $imageData = @()
          foreach ($img in $images) {
            $imgMs = New-Object System.IO.MemoryStream
            $img.Save($imgMs, [System.Drawing.Imaging.ImageFormat]::Png)
            $data = $imgMs.ToArray()
            $w = if ($img.Width -ge 256) { 0 } else { $img.Width }
            $h = if ($img.Height -ge 256) { 0 } else { $img.Height }
            $bw.Write([byte]$w)
            $bw.Write([byte]$h)
            $bw.Write([byte]0)
            $bw.Write([byte]0)
            $bw.Write([UInt16]1)
            $bw.Write([UInt16]32)
            $bw.Write([UInt32]$data.Length)
            $bw.Write([UInt32]$dataOffset)
            $dataOffset += $data.Length
            $imageData += ,$data
            $imgMs.Dispose()
          }
          foreach ($data in $imageData) {
            $bw.Write($data)
          }
          [System.IO.File]::WriteAllBytes("$iconDir/icon.ico", $ms.ToArray())
          $bw.Dispose()
          $ms.Dispose()
          foreach ($img in $images) { $img.Dispose() }
          $png.Dispose()
          Write-Host "Generated icon.ico"
        shell: pwsh

      - name: Build app bundle (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :desktop:createDistributable --no-daemon --stacktrace
        shell: bash

      - name: Codesign with entitlements (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find desktop/build/compose/binaries/main/app -name "*.app" -type d | head -1)
          echo "Signing: $APP_PATH"
          # Sign all nested frameworks/dylibs first
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.jnilib" \) -exec codesign --force --sign - {} \;
          find "$APP_PATH/Contents/runtime" -type f -name "java" -exec codesign --force --sign - --entitlements desktop/entitlements.plist {} \;
          # Sign the main app bundle
          codesign --force --deep --sign - --entitlements desktop/entitlements.plist "$APP_PATH"
          echo "Signing complete"
          codesign --verify --verbose "$APP_PATH" || echo "Verification note: ad-hoc signed"
        shell: bash

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find desktop/build/compose/binaries/main/app -name "*.app" -type d | head -1)
          APP_NAME=$(basename "$APP_PATH" .app)
          DMG_DIR=desktop/build/compose/binaries/main/dmg
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_DIR/${APP_NAME}-${{ steps.version.outputs.version }}.dmg"
          echo "DMG created:"
          ls -la "$DMG_DIR/"
        shell: bash

      - name: Build distribution (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew :desktop:${{ matrix.task }} --no-daemon --stacktrace
        shell: bash

      - name: Find and rename artifact
        id: artifact
        shell: bash
        run: |
          mkdir -p dist
          find desktop/build/compose/binaries -name "*.dmg" -o -name "*.msi" -o -name "*.deb" | while read f; do
            filename=$(basename "$f")
            name="${filename%.*}"
            ext="${filename##*.}"
            cp "$f" "dist/${name}-${{ matrix.platform }}.${ext}"
            echo "Found: $f -> dist/${name}-${{ matrix.platform }}.${ext}"
          done
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find all-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## DRO (Docker Remote Orchestrator) v${{ steps.version.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `*-macos-arm64.dmg` |
            | macOS (Intel) | `*-macos-x64.dmg` |
            | Windows | `*-windows-x64.msi` |

            ### Installation
            1. Download the file for your platform
            2. Install and run
            3. The app will auto-check for updates on startup

            > **macOS**: If you see "Apple cannot verify", run:
            > `xattr -cr /Applications/DRO.app`
            > or right-click the app and select **Open**.
          files: release/*
          draft: false
          prerelease: false
