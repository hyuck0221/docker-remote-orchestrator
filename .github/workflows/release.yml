name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            task: packageDmg
            ext: dmg
          - os: macos-13
            platform: macos-x64
            task: packageDmg
            ext: dmg
          - os: windows-latest
            platform: windows-x64
            task: packageMsi
            ext: msi

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in gradle.properties
        shell: bash
        run: |
          sed -i.bak "s/^app.version=.*/app.version=${{ steps.version.outputs.version }}/" gradle.properties
          cat gradle.properties

      - name: Build distribution
        run: ./gradlew :desktop:${{ matrix.task }} --no-daemon --stacktrace
        shell: bash

      - name: Find and rename artifact
        id: artifact
        shell: bash
        run: |
          mkdir -p dist
          find desktop/build/compose/binaries -name "*.${{ matrix.ext }}" -type f | while read f; do
            filename=$(basename "$f")
            name="${filename%.*}"
            cp "$f" "dist/${name}-${{ matrix.platform }}.${{ matrix.ext }}"
            echo "Found: $f -> dist/${name}-${{ matrix.platform }}.${{ matrix.ext }}"
          done
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find all-artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Docker Remote Orchestrator v${{ steps.version.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `*-macos-arm64.dmg` |
            | macOS (Intel) | `*-macos-x64.dmg` |
            | Windows | `*-windows-x64.msi` |

            ### Installation
            1. Download the file for your platform
            2. Install and run
            3. The app will auto-check for updates on startup
          files: release/*
          draft: false
          prerelease: false
